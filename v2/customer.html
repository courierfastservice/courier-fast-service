<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Track Shipment - Courier Fast Service</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="topbar">
    <h2>Courier Fast Service</h2>
    <p>Track Your Shipment</p>
  </header>

  <main class="dashboard">

    <section class="card">
      <h3>Track Shipment</h3>

      <input
        type="text"
        id="trackingInput"
        placeholder="Enter Tracking Number"
        autocomplete="off"
      />

      <button type="button" id="trackShipment">
        Track Package
      </button>
    </section>

    <section class="card">
      <div id="trackingResult">
        <div class="tracking-summary">
          <h3>Shipment Tracking</h3>
          <p>Enter your tracking number above to view the shipment journey.</p>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="tracking.js"></script>

</body>
</html>
