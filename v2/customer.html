<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Shipment - Courier Fast Service</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="firebase-config.js"></script>
