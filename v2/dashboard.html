<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courier Fast Service - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="shipment.js"></script>
</head>
<body>

  <header class="topbar">
    <h2>Courier Fast Service</h2>
    <p>Admin Dashboard</p>
  </header>

  <main class="dashboard">
    <section class="card">
      <h3>Create / Update Shipment</h3>

      <input type="text" id="trackingNumber" placeholder="Tracking Number (Leave empty for auto)" />

      <input type="text" id="senderName" placeholder="Sender Name" />
      <input type="text" id="senderPhone" placeholder="Sender Phone (Optional)" />
      <input type="email" id="senderEmail" placeholder="Sender Email (Optional)" />
      <textarea id="senderAddress" placeholder="Sender Address (Optional)"></textarea>

      <input type="text" id="receiverName" placeholder="Receiver Name" />
      <input type="text" id="receiverPhone" placeholder="Receiver Phone (Optional)" />
      <input type="email" id="receiverEmail" placeholder="Receiver Email (Optional)" />
      <textarea id="receiverAddress" placeholder="Receiver Address (Optional)"></textarea>

      <input type="text" id="origin" placeholder="Origin Country" />
      <input type="text" id="destination" placeholder="Destination Country" />

      <input type="text" id="currentLocation" placeholder="Current Location" />
      <textarea id="updateNote" placeholder="Update Note (Optional)"></textarea>

      <input type="text" id="weight" placeholder="Package Weight (Optional)" />
      <input type="text" id="description" placeholder="Package Description (Optional)" />
      <input type="date" id="deliveryDate" />

      <select id="status">
        <option>Shipment Created</option>
        <option>Picked Up</option>
        <option>In Transit</option>
        <option>Customs Clearance</option>
        <option>Out For Delivery</option>
        <option>Delivered</option>
        <option>On Hold</option>
      </select>

      <button id="saveShipment">Save Shipment</button>
    </section>

    <section class="card">
      <h3>Live Shipments</h3>
      <div id="shipmentList">No shipment available.</div>
    </section>
  </main>

</body>
  </html>
