<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Courier Fast Service - Admin Dashboard</title>

  <script>
    if (sessionStorage.getItem("cfsAdminLoggedIn") !== "true") {
      window.location.replace("login.html");
    }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="topbar">
    <div>
      <h2>Courier Fast Service</h2>
      <p>Admin Dashboard</p>
    </div>

    <button
      type="button"
      id="logoutButton"
      class="logout-button"
    >
      Logout
    </button>
  </header>

  <main class="dashboard">

    <section class="statistics-grid">

      <article class="stat-card stat-total">
        <div class="stat-icon">📦</div>
        <div>
          <p>Total Shipments</p>
          <h3 id="totalShipments">0</h3>
        </div>
      </article>

      <article class="stat-card stat-transit">
        <div class="stat-icon">🚚</div>
        <div>
          <p>In Transit</p>
          <h3 id="inTransitCount">0</h3>
        </div>
      </article>

      <article class="stat-card stat-delivery">
        <div class="stat-icon">🚛</div>
        <div>
          <p>Out For Delivery</p>
          <h3 id="outForDeliveryCount">0</h3>
        </div>
      </article>

      <article class="stat-card stat-delivered">
        <div class="stat-icon">✅</div>
        <div>
          <p>Delivered</p>
          <h3 id="deliveredCount">0</h3>
        </div>
      </article>

      <article class="stat-card stat-pending">
        <div class="stat-icon">⏳</div>
        <div>
          <p>Pending</p>
          <h3 id="pendingCount">0</h3>
        </div>
      </article>

    </section>

    <section class="card">
      <h3>Create / Update Shipment</h3>

      <input
        type="text"
        id="trackingNumber"
        placeholder="Tracking Number (Leave empty for auto)"
      />

      <input
        type="text"
        id="senderName"
        placeholder="Sender Name"
      />

      <input
        type="text"
        id="senderPhone"
        placeholder="Sender Phone (Optional)"
      />

      <input
        type="email"
        id="senderEmail"
        placeholder="Sender Email (Optional)"
      />

      <textarea
        id="senderAddress"
        placeholder="Sender Address (Optional)"
      ></textarea>

      <input
        type="text"
        id="receiverName"
        placeholder="Receiver Name"
      />

      <input
        type="text"
        id="receiverPhone"
        placeholder="Receiver Phone (Optional)"
      />

      <input
        type="email"
        id="receiverEmail"
        placeholder="Receiver Email (Optional)"
      />

      <textarea
        id="receiverAddress"
        placeholder="Receiver Address (Optional)"
      ></textarea>

      <input
        type="text"
        id="origin"
        placeholder="Origin Country"
      />

      <input
        type="text"
        id="destination"
        placeholder="Destination Country"
      />

      <input
        type="text"
        id="currentLocation"
        placeholder="Current Location"
      />

      <textarea
        id="updateNote"
        placeholder="Update Note (Optional)"
      ></textarea>

      <input
        type="text"
        id="weight"
        placeholder="Package Weight (Optional)"
      />

      <input
        type="text"
        id="description"
        placeholder="Package Description (Optional)"
      />

      <input
        type="date"
        id="deliveryDate"
      />

      <label for="packagePhoto">
        Package Photo or Document (Optional)
      </label>

      <input
        type="file"
        id="packagePhoto"
        accept="image/*,.pdf"
      />

      <select id="status">
        <option value="Shipment Created">Shipment Created</option>
        <option value="Picked Up">Picked Up</option>
        <option value="In Transit">In Transit</option>
        <option value="Arrived At Sorting Center">Arrived At Sorting Center</option>
        <option value="Departed Sorting Center">Departed Sorting Center</option>
        <option value="Customs Clearance">Customs Clearance</option>
        <option value="Released By Customs">Released By Customs</option>
        <option value="Flight Dispatched">Flight Dispatched</option>
        <option value="Arrived Destination Country">Arrived Destination Country</option>
        <option value="Out For Delivery">Out For Delivery</option>
        <option value="Delivered">Delivered</option>
        <option value="Delivery Attempt Failed">Delivery Attempt Failed</option>
        <option value="On Hold">On Hold</option>
        <option value="Returned To Sender">Returned To Sender</option>
      </select>

      <button
        type="button"
        id="saveShipment"
      >
        Save Shipment
      </button>
    </section>

    <section class="card">
      <h3>Search Shipment</h3>

      <input
        type="text"
        id="searchTrackingNumber"
        placeholder="Enter Tracking Number"
        autocomplete="off"
      />

      <button
        type="button"
        id="searchShipmentButton"
      >
        Search Shipment
      </button>

      <button
        type="button"
        id="clearSearchButton"
      >
        Show All Shipments
      </button>

      <div id="searchMessage"></div>
    </section>

    <section class="card">
      <h3>Live Shipments</h3>

      <div id="shipmentList">
        Loading shipments...
      </div>
    </section>

  </main>

  <script type="module" src="shipment.js"></script>

  <script>
    document
      .getElementById("logoutButton")
      .addEventListener("click", function () {
        sessionStorage.removeItem("cfsAdminLoggedIn");
        window.location.replace("login.html");
      });
  </script>

</body>
  </html>
