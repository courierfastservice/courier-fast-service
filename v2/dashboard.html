<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courier Fast Service - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="topbar">
    <h2>Courier Fast Service</h2>
    <p>Admin Dashboard</p>
  </header>

  <main class="dashboard">
    <section class="card">
      <h3>Create / Update Shipment</h3>

      <input
        type="text"
        id="trackingNumber"
        placeholder="Tracking Number (Leave empty for auto)"
      />

      <input type="text" id="senderName" placeholder="Sender Name" />
      <input type="text" id="senderPhone" placeholder="Sender Phone (Optional)" />
      <input type="email" id="senderEmail" placeholder="Sender Email (Optional)" />
      <textarea id="senderAddress" placeholder="Sender Address (Optional)"></textarea>

      <input type="text" id="receiverName" placeholder="Receiver Name" />
      <input type="text" id="receiverPhone" placeholder="Receiver Phone (Optional)" />
      <input type="email" id="receiverEmail" placeholder="Receiver Email (Optional)" />
      <textarea id="receiverAddress" placeholder="Receiver Address (Optional)"></textarea>

      <input type="text" id="origin" placeholder="Origin Country" />
      <input type="text" id="destination" placeholder="Destination Country" />

      <input type="text" id="currentLocation" placeholder="Current Location" />
      <textarea id="updateNote" placeholder="Update Note (Optional)"></textarea>

      <input type="text" id="weight" placeholder="Package Weight (Optional)" />
      <input type="text" id="description" placeholder="Package Description (Optional)" />
      <input type="date" id="deliveryDate" />

      <label for="packagePhoto">Package Photo or Document (Optional)</label>
      <input type="file" id="packagePhoto" accept="image/*,.pdf" />

      <select id="status">
        <option value="Shipment Created">Shipment Created</option>
        <option value="Picked Up">Picked Up</option>
        <option value="In Transit">In Transit</option>
        <option value="Arrived At Sorting Center">Arrived At Sorting Center</option>
        <option value="Departed Sorting Center">Departed Sorting Center</option>
        <option value="Customs Clearance">Customs Clearance</option>
        <option value="Released By Customs">Released By Customs</option>
        <option value="Flight Dispatched">Flight Dispatched</option>
        <option value="Arrived Destination Country">Arrived Destination Country</option>
        <option value="Out For Delivery">Out For Delivery</option>
        <option value="Delivered">Delivered</option>
        <option value="Delivery Attempt Failed">Delivery Attempt Failed</option>
        <option value="On Hold">On Hold</option>
        <option value="Returned To Sender">Returned To Sender</option>
      </select>

      <button type="button" id="saveShipment">Save Shipment</button>
    </section>

    <section class="card">
      <h3>Live Shipments</h3>
      <div id="shipmentList">Loading shipments...</div>
    </section>
  </main>

  <script type="module" src="shipment.js"></script>
</body>
  </html>
